{% extends 'base.html' %}
{% block title %}Delete Teacher — SchoolMS{% endblock %}
{% block page_title %}Delete Teacher{% endblock %}

{% block content %}
<div class="confirm-delete-card animate-in">
    <div class="delete-icon">
        <i class="fas fa-exclamation-triangle"></i>
    </div>
    <h2>Delete Teacher?</h2>
    <p>
        Are you sure you want to delete <strong>{{ teacher.full_name }}</strong>?
        This action cannot be undone.
    </p>
    <form method="post">
        {% csrf_token %}
        <div class="btn-group">
            <button type="submit" class="btn btn-danger">
                <i class="fas fa-trash"></i> Yes, Delete
            </button>
            <a href="{% url 'teacher_list' %}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
